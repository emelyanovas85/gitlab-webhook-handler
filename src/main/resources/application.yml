spring:
  application:
    name: git-webhook-handler
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:local}
  ai:
    openai:
      base-url: ${OPENAI_BASE_URL:https://api.openai.com}
      # OPENAI_API_KEY задаётся через переменную окружения в runtime
      # или через application-local.yml (локальный профиль).
      # placeholder 'dummy' позволяет приложению стартовать без реального ключа.
      api-key: ${OPENAI_API_KEY:dummy}
      chat:
        options:
          model: ${OPENAI_MODEL:gpt-4o-mini}
          temperature: 0.3
        completions-path: ${OPENAI_COMPLETIONS_PATH:/v1/chat/completions}

server:
  port: 8081

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: always

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    try-it-out-enabled: true
    operations-sorter: alpha
    tags-sorter: alpha
    display-request-duration: true

app:
  gitlab:
    url: ${GITLAB_URL:http://localhost}
    token: ${GITLAB_TOKEN:changeme}
    webhook-token: ${GITLAB_WEBHOOK_TOKEN:changeme}
  graph-service:
    # Базовый URL граф-сервиса
    url: ${GRAPH_SERVICE_URL:http://localhost:8090}
  ai:
    system-prompt: |
      You are a senior Java developer performing a thorough code review.
      You will receive a code context (a group of related files and changes).
      Your task:
      1. Identify bugs, security issues, performance problems, and code quality concerns.
      2. Check adherence to SOLID principles and clean code practices.
      3. If you need to understand a dependency or related class, use the available tools to fetch additional context.
      4. Provide your review in structured markdown:
         ### Issues Found
         List each issue with: severity (CRITICAL / MAJOR / MINOR), location, description, suggested fix.
         ### Positive Aspects
         Note well-written parts.
         ### Summary
         One paragraph overall assessment.
      If no issues are found, state that explicitly.
      Respond in the same language as the code comments, or in English if unclear.
