spring:
  application:
    name: git-webhook-handler
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:local}
  ai:
    openai:
      base-url: ${OPENAI_BASE_URL:https://api.openai.com}
      # OPENAI_API_KEY задаётся через переменную окружения в runtime
      # или через application-local.yml (локальный профиль).
      # placeholder 'dummy' позволяет приложению стартовать без реального ключа.
      api-key: ${OPENAI_API_KEY:dummy}
      chat:
        options:
          model: ${OPENAI_MODEL:gpt-4o-mini}
          temperature: 0.3
        completions-path: ${OPENAI_COMPLETIONS_PATH:/v1/chat/completions}

server:
  port: 8081

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: always

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    try-it-out-enabled: true
    operations-sorter: alpha
    tags-sorter: alpha
    display-request-duration: true

# Настройки подписки на webhook-distributor
# (параметры WebhookClientProperties из библиотеки webhook-distributor-client)
webhook:
  client:
    # Базовый URL webhook-distributor
    server-url: ${WEBHOOK_DISTRIBUTOR_URL:http://10.1.5.97:8081}
    # Уникальный идентификатор этого сервиса среди всех подписчиков
    subscriber-id: git-webhook-handler
    # Источник webhook-событий (должен совпадать с source в webhook-distributor)
    source: gitlab
    # Логическая метка этого обработчика (сервер её не вызывает по HTTP)
    target-endpoint: gitlab.merge-request
    # Фильтр типов событий — принимаем только Merge Request Hook
    event-type-filter:
      - Merge Request Hook
    # Запрашивать пропущенные события при переподключении
    missed-events-on-reconnect: true
    missed-events-batch-size: 50
    reconnect-delay-ms: 3000
    max-reconnect-delay-ms: 30000

app:
  gitlab:
    url: ${GITLAB_URL:http://localhost}
    token: ${GITLAB_TOKEN:changeme}
  graph-service:
    # Базовый URL граф-сервиса
    url: ${GRAPH_SERVICE_URL:http://localhost:8090}
  ai:
    # Путь к файлу с system prompt. Можно переопределить через переменную окружения
    # или указать file:-путь для монтирования промпта снаружи контейнера.
    # Пример: APP_AI_PROMPT_FILE=file:/etc/mr-checker/system-prompt.md
    prompt-file: ${APP_AI_PROMPT_FILE:classpath:prompts/system-prompt.md}
