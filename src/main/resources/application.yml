spring:
  application:
    name: webhook-handler

server:
  port: 9090

webhook:
  gitlab:
    secret-token: ${WEBHOOK_GITLAB_SECRET_TOKEN:}
  github:
    secret-token: ${WEBHOOK_GITHUB_SECRET_TOKEN:}

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: always

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    try-it-out-enabled: true
    operations-sorter: alpha
    tags-sorter: alpha
    display-request-duration: true

jenkins:
  url: http://10.1.5.6:8180
  job-path: job/VPEPVV/job/Autotests/job/Development/job/webhook
  username:

  token:
  poll-interval-seconds: 5